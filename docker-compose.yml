version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: storyroom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: storyroom
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./storyroom-api/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+08:00'
    ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - storyroom-net

  storyroom-api:
    build:
      context: ./storyroom-api
      dockerfile: Dockerfile
    container_name: storyroom-api
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: storyroom
      DB_USER: root
      DB_PASSWORD: root123456
      DB_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./storyroom-api:/var/www/html
    networks:
      - storyroom-net

  storyroom-web:
    build:
      context: ./storyroom-web
      dockerfile: Dockerfile
    container_name: storyroom-web
    ports:
      - "3000:80"
    depends_on:
      - storyroom-api
    networks:
      - storyroom-net

volumes:
  mysql_data:

networks:
  storyroom-net:
    driver: bridge
